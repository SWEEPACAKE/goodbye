<app-banner></app-banner>

<div class="py-4 px-3">

    <div class="grid">
        @for (slot of slots; track $index) {
            <div class="slot {{ slot.size }}">
                @if (slot.component) {
                    <ng-container [ngComponentOutlet]="slot.component" />
                }
            </div>
        }
        <div class="slot full">
            <ng-container [ngComponentOutlet]="nicolas"></ng-container>
        </div>
    </div>
</div>
